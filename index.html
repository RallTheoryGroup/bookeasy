<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookEasy</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #282c34;
            color: #61dafb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #abb2bf;
        }
        button {
            margin-top: 1.5rem;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            background-color: #61dafb;
            color: #282c34;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover {
            background-color: #21a1c9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to BookEasy!</h1>
        <p>
            BookEasy is your all-in-one appointment booking platform.
            Schedule meetings, manage availability, and streamline your
            booking workflow - all in one place.
        </p>
        <button onclick="alert('Booking feature coming soon!')">
            Book an Appointment
        </button>
    </div>
</body>
</html>
